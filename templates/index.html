<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letshego Group Security Scanner</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green:       #1a7f5a;
            --green-dark:  #156347;
            --green-light: #27ae60;
            --orange:      #e67e22;
            --red:         #c0392b;
            --amber:       #e67e22;
            --blue:        #2980b9;
            --text:        #1c2b22;
            --muted:       #6b7c75;
            --border:      #dde8e2;
            --bg:          #f4f8f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--green) 0%, var(--orange) 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: repeating-linear-gradient(
                45deg, transparent, transparent 35px,
                rgba(255,255,255,.04) 35px, rgba(255,255,255,.04) 70px
            );
            pointer-events: none; z-index: 0;
        }

        .container { max-width: 1280px; margin: 0 auto; position: relative; z-index: 1; }

        /* ── Header ── */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            color: white; margin-bottom: 28px; gap: 20px;
        }
        .header h1 { font-size: 2.2em; text-shadow: 1px 2px 6px rgba(0,0,0,.25); }
        .header p  { font-size: 1em; opacity: .9; margin-top: 6px; }
        .header-logo {
            background: white; padding: 10px 18px; border-radius: 10px;
            box-shadow: 0 4px 12px rgba(0,0,0,.12); height: 76px; flex-shrink: 0;
        }
        .header-logo img { height: 100%; width: auto; display: block; }

        /* ── Tabs ── */
        .tabs {
            display: flex; gap: 4px;
            background: rgba(255,255,255,.15); border-radius: 10px;
            padding: 4px; margin-bottom: 20px; width: fit-content;
        }
        .tab-btn {
            padding: 10px 24px; border: none; border-radius: 8px;
            font-size: 0.95em; font-weight: 600; cursor: pointer;
            background: transparent; color: rgba(255,255,255,.8);
            transition: all .2s;
        }
        .tab-btn.active {
            background: white; color: var(--green);
            box-shadow: 0 2px 8px rgba(0,0,0,.12);
        }
        .tab-btn:not(.active):hover { background: rgba(255,255,255,.2); color: white; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Card ── */
        .card {
            background: white; border-radius: 12px;
            padding: 28px; box-shadow: 0 8px 32px rgba(0,0,0,.09);
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 1.15em; font-weight: 700;
            color: var(--text); margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }

        /* ── Config bar ── */
        .config-bar {
            display: flex; flex-wrap: wrap; gap: 18px;
            padding: 12px 16px;
            background: #f5fbf8; border-left: 4px solid var(--green);
            border-radius: 8px; margin-bottom: 22px; font-size: .88em;
        }
        .config-item { display: flex; align-items: center; gap: 6px; }
        .config-item.enabled  { color: var(--green-light); }
        .config-item.disabled { color: var(--red); }

        /* ── Form ── */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; color: var(--text); margin-bottom: 6px; font-size: .92em; }
        .form-group input[type="text"],
        .form-group input[type="url"] {
            width: 100%; padding: 11px 14px;
            border: 2px solid var(--border); border-radius: 8px;
            font-size: 15px; transition: border-color .2s;
        }
        .form-group input:focus { outline: none; border-color: var(--green); }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green); }
        .checkbox-group label { cursor: pointer; font-size: .92em; color: var(--text); }

        /* ── Buttons ── */
        .btn {
            padding: 11px 26px; font-size: .95em; font-weight: 600;
            border: none; border-radius: 8px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 7px;
            transition: all .2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
            color: white;
        }
        .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 5px 18px rgba(26,127,90,.35); }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }
        .btn-danger { background: #fee; color: var(--red); border: 1px solid #fcc; padding: 6px 12px; font-size: .82em; }
        .btn-danger:hover { background: #fdd; }

        /* ── Status bar ── */
        .status-bar {
            display: none; margin-top: 18px; padding: 14px;
            background: #f0f8f5; border-left: 4px solid var(--green);
            border-radius: 8px; font-size: .92em;
        }
        .status-bar.active  { display: flex; align-items: center; gap: 10px; }
        .status-bar.error   { background: #fff0f0; border-left-color: var(--red); }
        .status-bar.success { background: #f0fff4; border-left-color: var(--green-light); }

        /* ── Spinner ── */
        .spinner {
            display: inline-block; width: 15px; height: 15px; flex-shrink: 0;
            border: 3px solid rgba(26,127,90,.25); border-top-color: var(--green);
            border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Summary grid ── */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px; margin-bottom: 24px;
        }
        .stat-card {
            padding: 18px; border-radius: 10px;
            color: white; text-align: center;
        }
        .stat-card .val   { font-size: 2.2em; font-weight: 700; line-height: 1; }
        .stat-card .lbl   { font-size: .82em; opacity: .9; margin-top: 5px; }
        .stat-green  { background: linear-gradient(135deg, var(--green), var(--green-light)); }
        .stat-red    { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        .stat-amber  { background: linear-gradient(135deg, #d35400, var(--orange)); }
        .stat-blue   { background: linear-gradient(135deg, #1a5276, var(--blue)); }
        .stat-teal   { background: linear-gradient(135deg, #117a65, #1abc9c); }
        .stat-dark   { background: linear-gradient(135deg, #2c3e50, #4a6074); }

        /* ── Download bar ── */
        .download-bar {
            padding: 14px; background: var(--bg);
            border-radius: 8px; margin-top: 16px;
        }
        .download-bar p { font-size: .88em; font-weight: 600; color: var(--muted); margin-bottom: 10px; }
        .download-bar a {
            display: inline-block; margin-right: 10px; margin-bottom: 6px;
            padding: 7px 14px; background: var(--green);
            color: white; text-decoration: none;
            border-radius: 6px; font-size: .85em; transition: all .2s;
        }
        .download-bar a:hover { background: var(--green-dark); transform: translateY(-1px); }

        /* ── Findings ── */
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
        .filter-btn {
            padding: 6px 14px; border-radius: 20px; border: 2px solid transparent;
            font-size: .82em; font-weight: 600; cursor: pointer;
            transition: all .15s; background: var(--bg); color: var(--muted);
        }
        .filter-btn:hover, .filter-btn.active { border-color: currentColor; }
        .filter-all    { color: var(--green); }
        .filter-high   { color: var(--red); }
        .filter-medium { color: var(--amber); }
        .filter-low    { color: var(--blue); }
        .filter-info   { color: #6c757d; }

        .finding-item {
            border: 1px solid var(--border); border-radius: 10px;
            padding: 18px; margin-bottom: 12px; transition: box-shadow .2s;
        }
        .finding-item:hover { box-shadow: 0 4px 14px rgba(0,0,0,.08); }
        .finding-header { display: flex; align-items: center; gap: 12px; }
        .finding-title  { flex: 1; font-size: 1em; font-weight: 600; color: var(--text); }
        .finding-body   { margin-top: 14px; line-height: 1.65; display: none; }

        .sev-badge {
            padding: 4px 10px; border-radius: 5px;
            font-size: .78em; font-weight: 700; text-transform: uppercase; flex-shrink: 0;
        }
        .sev-high   { background: #fee2e2; color: #b91c1c; }
        .sev-medium { background: #fff3cd; color: #92400e; }
        .sev-low    { background: #dbeafe; color: #1e40af; }
        .sev-info   { background: #e0f2fe; color: #075985; }

        .finding-section        { margin-bottom: 12px; }
        .finding-section h4     { font-size: .85em; font-weight: 700; color: var(--green); margin-bottom: 5px; }
        .finding-section p      { font-size: .9em; color: #4a5568; white-space: pre-wrap; }
        .affected-list          { list-style: none; padding: 0; }
        .affected-list li       { padding: 6px 10px; background: var(--bg); border-radius: 4px; margin-bottom: 4px; font-size: .82em; font-family: monospace; word-break: break-all; }

        .toggle-btn { padding: 5px 11px; background: var(--bg); border: none; border-radius: 5px; font-size: .8em; cursor: pointer; color: var(--muted); flex-shrink: 0; }
        .toggle-btn:hover { background: var(--border); }

        /* ── Dashboard ── */
        .dash-top { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }

        .url-table { width: 100%; border-collapse: collapse; font-size: .9em; }
        .url-table thead th {
            text-align: left; padding: 10px 14px;
            background: var(--bg); color: var(--muted);
            font-weight: 600; font-size: .8em; text-transform: uppercase;
            letter-spacing: .05em; border-bottom: 2px solid var(--border);
        }
        .url-table tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
        .url-table tbody tr:hover { background: var(--bg); }
        .url-table td { padding: 12px 14px; vertical-align: middle; }
        .url-cell { font-family: monospace; font-size: .88em; word-break: break-all; color: var(--text); }
        .scan-count {
            display: inline-block; padding: 3px 10px;
            background: #e8f5ee; color: var(--green);
            border-radius: 12px; font-weight: 700; font-size: .85em;
        }
        .mini-sev { display: flex; gap: 5px; flex-wrap: wrap; }
        .mini-badge {
            padding: 2px 8px; border-radius: 4px;
            font-size: .75em; font-weight: 600;
        }
        .mini-high   { background: #fee2e2; color: #b91c1c; }
        .mini-medium { background: #fff3cd; color: #92400e; }
        .mini-low    { background: #dbeafe; color: #1e40af; }
        .mini-info   { background: #e0f2fe; color: #075985; }
        .date-cell   { font-size: .82em; color: var(--muted); white-space: nowrap; }

        .empty-state {
            text-align: center; padding: 50px 20px; color: var(--muted);
        }
        .empty-state .icon { font-size: 3em; margin-bottom: 12px; }
        .empty-state p { font-size: .95em; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .header { flex-direction: column; }
            .header h1 { font-size: 1.7em; }
            .header-logo { height: 58px; }
            .config-bar { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ── Header ── -->
    <div class="header">
        <div>
            <h1>🛡️ Letshego Group Security Scanner</h1>
            <p>Automated vulnerability scanning powered by ZAP, AI enrichment &amp; SysReptor integration</p>
        </div>
        <div class="header-logo">
            <img src="/static/images/LHL-Logo.png" alt="Letshego Group Logo">
        </div>
    </div>

    <!-- ── Tabs ── -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('scanner', this)">🔍 Scanner</button>
        <button class="tab-btn"        onclick="switchTab('dashboard', this)">📊 Dashboard</button>
    </div>

    <!-- ================================================================ -->
    <!-- SCANNER TAB                                                       -->
    <!-- ================================================================ -->
    <div id="tab-scanner" class="tab-panel active">

        <div class="card">
            <!-- Config status -->
            <div id="configBar" class="config-bar">
                <div class="config-item" id="dockerStatus">🐳 Docker: <span class="status-text">Checking…</span></div>
                <div class="config-item" id="geminiStatus">🤖 Gemini AI: <span class="status-text">Checking…</span></div>
                <div class="config-item" id="reptorStatus">📤 SysReptor: <span class="status-text">Checking…</span></div>
            </div>

            <form id="scanForm">
                <div class="form-group">
                    <label for="targetUrl">Target URL</label>
                    <input type="url" id="targetUrl" placeholder="https://example.com" required>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="useAI" checked>
                    <label for="useAI">Enable AI enrichment (requires Gemini API key)</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="exportReptor">
                    <label for="exportReptor">Export findings to SysReptor</label>
                </div>
                <div class="form-group" id="projectNameGroup" style="display:none">
                    <label for="projectName">SysReptor Project Name</label>
                    <input type="text" id="projectName" placeholder="Security Assessment – 2025-06-04">
                </div>
                <button type="submit" id="scanBtn" class="btn btn-primary">🔍 Start Scan</button>
            </form>

            <div id="statusBar" class="status-bar">
                <div class="spinner" id="statusSpinner"></div>
                <span id="statusText">Initialising…</span>
            </div>
        </div>

        <!-- Results -->
        <div id="resultsSection" style="display:none">
            <div class="card">
                <div class="card-title">📊 Scan Results</div>
                <div id="scanSummary" class="summary-grid"></div>
                <div id="downloadBar" class="download-bar" style="display:none">
                    <p>Download Reports</p>
                    <div id="downloadButtons"></div>
                </div>
                <div id="sysreptorNote"></div>
            </div>

            <div class="card">
                <div class="card-title">🔎 Findings</div>
                <div class="filter-bar">
                    <button class="filter-btn filter-all active"    onclick="filterFindings('all',this)">All</button>
                    <button class="filter-btn filter-high"          onclick="filterFindings('high',this)">High</button>
                    <button class="filter-btn filter-medium"        onclick="filterFindings('medium',this)">Medium</button>
                    <button class="filter-btn filter-low"           onclick="filterFindings('low',this)">Low</button>
                    <button class="filter-btn filter-info"          onclick="filterFindings('info',this)">Info</button>
                </div>
                <div id="findingsList"></div>
            </div>
        </div>
    </div><!-- /tab-scanner -->

    <!-- ================================================================ -->
    <!-- DASHBOARD TAB                                                     -->
    <!-- ================================================================ -->
    <div id="tab-dashboard" class="tab-panel">

        <!-- Top-level totals -->
        <div class="card">
            <div class="card-title">🌍 Organisation Vulnerability Totals</div>
            <div id="dashTotals" class="dash-top"></div>
        </div>

        <!-- Per-URL table -->
        <div class="card">
            <div class="card-title" style="justify-content:space-between">
                <span>🔗 Scanned URLs</span>
                <button class="btn btn-primary" style="font-size:.82em; padding:7px 14px"
                        onclick="loadDashboard()">↻ Refresh</button>
            </div>
            <div id="dashTable"></div>
        </div>

    </div><!-- /tab-dashboard -->

</div><!-- /container -->

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Tab switching
// ─────────────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'dashboard') loadDashboard();
}

// ─────────────────────────────────────────────────────────────────────────────
// Config check
// ─────────────────────────────────────────────────────────────────────────────
async function loadConfig() {
    try {
        const cfg = await fetch('/api/config').then(r => r.json());
        setStatus('dockerStatus', cfg.docker_available, 'Available', 'Not found');
        setStatus('geminiStatus', cfg.has_gemini_key, 'Configured', 'Not configured');
        setStatus('reptorStatus', cfg.has_reptor_config, 'Configured', 'Not configured');
    } catch(e) {}
}

function setStatus(id, ok, yes, no) {
    const el = document.getElementById(id);
    el.classList.toggle('enabled', ok);
    el.classList.toggle('disabled', !ok);
    el.querySelector('.status-text').textContent = ok ? yes : no;
}

// ─────────────────────────────────────────────────────────────────────────────
// Scanner form
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('exportReptor').addEventListener('change', function() {
    document.getElementById('projectNameGroup').style.display = this.checked ? 'block' : 'none';
});

document.getElementById('scanForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn  = document.getElementById('scanBtn');
    const bar  = document.getElementById('statusBar');

    document.getElementById('resultsSection').style.display = 'none';

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Scanning…';
    bar.className = 'status-bar active';
    document.getElementById('statusSpinner').style.display = 'inline-block';
    document.getElementById('statusText').textContent = 'Submitting scan request…';

    const payload = {
        url:                document.getElementById('targetUrl').value.trim(),
        use_ai:             document.getElementById('useAI').checked,
        export_to_sysreptor:document.getElementById('exportReptor').checked,
        project_name:       document.getElementById('projectName').value.trim()
    };

    try {
        // Step 1: kick off the job — returns immediately with a job_id
        const kickoff = await fetch('/api/scan', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });

        if (!kickoff.ok) {
            const err = await kickoff.json();
            throw new Error(err.error || 'Failed to start scan');
        }

        const { job_id } = await kickoff.json();

        // Step 2: poll for completion
        await pollJob(job_id);

    } catch(err) {
        bar.className = 'status-bar active error';
        document.getElementById('statusSpinner').style.display = 'none';
        document.getElementById('statusText').textContent = '❌ ' + err.message;
        btn.disabled = false;
        btn.innerHTML = '🔍 Start Scan';
    }
});

async function pollJob(job_id) {
    const btn  = document.getElementById('scanBtn');
    const bar  = document.getElementById('statusBar');

    while (true) {
        await new Promise(r => setTimeout(r, 3000)); // poll every 3s

        let job;
        try {
            const res = await fetch(`/api/scan/status/${job_id}`);
            job = await res.json();
        } catch(e) {
            // transient network hiccup — keep trying
            document.getElementById('statusText').textContent =
                '⏳ Waiting for server response…';
            continue;
        }

        // Update progress bar message
        const pct  = job.progress || 0;
        const msg  = job.message  || 'Working…';
        document.getElementById('statusText').textContent =
            `[${pct}%] ${msg}`;

        if (job.status === 'done') {
            showResults(job.result);
            bar.className = 'status-bar active success';
            document.getElementById('statusSpinner').style.display = 'none';
            document.getElementById('statusText').textContent =
                `✅ Scan complete — ${job.result.findings_count} finding(s) found`;
            btn.disabled = false;
            btn.innerHTML = '🔍 Start Scan';
            return;
        }

        if (job.status === 'error') {
            bar.className = 'status-bar active error';
            document.getElementById('statusSpinner').style.display = 'none';
            document.getElementById('statusText').textContent = '❌ ' + job.message;
            btn.disabled = false;
            btn.innerHTML = '🔍 Start Scan';
            return;
        }
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// Results rendering
// ─────────────────────────────────────────────────────────────────────────────
let allFindings = [];

function showResults(result) {
    allFindings = result.findings || [];

    const c = {high:0, medium:0, low:0, info:0};
    allFindings.forEach(f => { const s = f.data.severity||'info'; c[s]=(c[s]||0)+1; });

    document.getElementById('scanSummary').innerHTML = `
        <div class="stat-card stat-green"><div class="val">${result.findings_count}</div><div class="lbl">Total</div></div>
        <div class="stat-card stat-red">  <div class="val">${c.high}</div>  <div class="lbl">High</div></div>
        <div class="stat-card stat-amber"><div class="val">${c.medium}</div><div class="lbl">Medium</div></div>
        <div class="stat-card stat-blue"> <div class="val">${c.low}</div>   <div class="lbl">Low</div></div>
        <div class="stat-card stat-teal"> <div class="val">${c.info}</div>  <div class="lbl">Info</div></div>
    `;

    if (result.scan_files) {
        const labels = {json:'📄 ZAP JSON', html:'🌐 HTML Report', parsed:'📋 Parsed JSON'};
        document.getElementById('downloadButtons').innerHTML =
            Object.entries(result.scan_files).map(([k, path]) => {
                const f = path.split('/').pop();
                return `<a href="/api/download/${encodeURIComponent(f)}" target="_blank">${labels[k]||f}</a>`;
            }).join('');
        document.getElementById('downloadBar').style.display = 'block';
    }

    if (result.sysreptor) {
        const sr = result.sysreptor;
        document.getElementById('sysreptorNote').innerHTML =
            `<div style="margin-top:12px;padding:10px;background:#d4edda;border-radius:6px;color:#155724;font-size:.88em">
                ✅ Exported to SysReptor — <strong>${x(sr.project_name)}</strong> (${sr.project_id})
             </div>`;
    }

    renderFindings(allFindings);
    document.getElementById('resultsSection').style.display = 'block';
}

function filterFindings(sev, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderFindings(sev === 'all' ? allFindings : allFindings.filter(f => f.data.severity === sev));
}

function renderFindings(list) {
    const el = document.getElementById('findingsList');
    if (!list.length) {
        el.innerHTML = '<p style="text-align:center;padding:30px;color:var(--muted)">No findings in this category.</p>';
        return;
    }
    el.innerHTML = list.map((f, i) => {
        const d   = f.data;
        const sev = d.severity || 'info';
        const aff = d.affected_components || [];
        const refs = d.references || [];
        return `
        <div class="finding-item">
            <div class="finding-header">
                <span class="sev-badge sev-${sev}">${sev}</span>
                <div class="finding-title">${x(d.title||'Untitled')}</div>
                <button class="toggle-btn" onclick="toggleBody('fb${i}',this)">▼ Expand</button>
            </div>
            <div id="fb${i}" class="finding-body">
                ${d.description ? `<div class="finding-section"><h4>Description</h4><p>${x(d.description)}</p></div>` : ''}
                ${d.recommendation ? `<div class="finding-section"><h4>Recommendation</h4><p>${x(d.recommendation)}</p></div>` : ''}
                ${aff.length ? `<div class="finding-section"><h4>Affected Components</h4>
                    <ul class="affected-list">
                        ${aff.slice(0,10).map(a=>`<li>${x(a)}</li>`).join('')}
                        ${aff.length>10?`<li>…and ${aff.length-10} more</li>`:''}
                    </ul></div>` : ''}
                ${refs.length ? `<div class="finding-section"><h4>References</h4>
                    <ul class="affected-list">${refs.map(r=>`<li>${x(r)}</li>`).join('')}</ul></div>` : ''}
            </div>
        </div>`;
    }).join('');
}

function toggleBody(id, btn) {
    const el = document.getElementById(id);
    const show = el.style.display === 'none' || !el.style.display;
    el.style.display = show ? 'block' : 'none';
    btn.textContent  = show ? '▲ Collapse' : '▼ Expand';
}

// ─────────────────────────────────────────────────────────────────────────────
// Dashboard
// ─────────────────────────────────────────────────────────────────────────────
async function loadDashboard() {
    try {
        const d = await fetch('/api/dashboard').then(r => r.json());
        renderDashTotals(d);
        renderDashTable(d.urls || []);
    } catch(e) {
        document.getElementById('dashTable').innerHTML =
            '<p style="color:var(--red);padding:20px">Failed to load dashboard data.</p>';
    }
}

function renderDashTotals(d) {
    const t = d.totals || {};
    document.getElementById('dashTotals').innerHTML = `
        <div class="stat-card stat-dark">  <div class="val">${d.total_urls}</div>   <div class="lbl">Unique URLs</div></div>
        <div class="stat-card stat-green"> <div class="val">${d.total_scans}</div>  <div class="lbl">Total Scans</div></div>
        <div class="stat-card stat-red">   <div class="val">${t.high||0}</div>      <div class="lbl">High (latest)</div></div>
        <div class="stat-card stat-amber"> <div class="val">${t.medium||0}</div>    <div class="lbl">Medium (latest)</div></div>
        <div class="stat-card stat-blue">  <div class="val">${t.low||0}</div>       <div class="lbl">Low (latest)</div></div>
        <div class="stat-card stat-teal">  <div class="val">${t.info||0}</div>      <div class="lbl">Info (latest)</div></div>
    `;
}

function renderDashTable(urls) {
    const el = document.getElementById('dashTable');
    if (!urls.length) {
        el.innerHTML = `<div class="empty-state">
            <div class="icon">🔍</div>
            <p>No scans recorded yet. Run your first scan from the Scanner tab.</p>
        </div>`;
        return;
    }

    const rows = urls.map(u => {
        const lc = u.latest || {};
        const badges = [
            lc.high   ? `<span class="mini-badge mini-high">${lc.high}H</span>`   : '',
            lc.medium ? `<span class="mini-badge mini-medium">${lc.medium}M</span>` : '',
            lc.low    ? `<span class="mini-badge mini-low">${lc.low}L</span>`     : '',
            lc.info   ? `<span class="mini-badge mini-info">${lc.info}I</span>`   : '',
        ].filter(Boolean).join('') || '<span style="color:var(--muted);font-size:.8em">none</span>';

        const lastScan = u.last_scanned
            ? new Date(u.last_scanned).toLocaleString(undefined, {dateStyle:'medium',timeStyle:'short'})
            : '—';
        const firstScan = u.first_scanned
            ? new Date(u.first_scanned).toLocaleDateString(undefined, {dateStyle:'medium'})
            : '—';

        return `<tr>
            <td class="url-cell">${x(u.url)}</td>
            <td><span class="scan-count">${u.scan_count||1}</span></td>
            <td><div class="mini-sev">${badges}</div></td>
            <td class="date-cell">${lastScan}</td>
            <td class="date-cell">${firstScan}</td>
            <td>
                <button class="btn btn-danger"
                    onclick="deleteEntry('${encodeURIComponent(u.url)}', this)">🗑 Remove</button>
            </td>
        </tr>`;
    }).join('');

    el.innerHTML = `
        <table class="url-table">
            <thead>
                <tr>
                    <th>URL</th>
                    <th>Scans</th>
                    <th>Latest Findings</th>
                    <th>Last Scanned</th>
                    <th>First Scanned</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    `;
}

async function deleteEntry(encodedUrl, btn) {
    if (!confirm('Remove this URL from the dashboard? Scan files are not deleted.')) return;
    btn.disabled = true;
    try {
        const res = await fetch('/api/dashboard/delete/' + encodedUrl, {method: 'DELETE'});
        if (res.ok) {
            loadDashboard();
        } else {
            alert('Could not remove entry.');
            btn.disabled = false;
        }
    } catch(e) {
        alert('Network error.');
        btn.disabled = false;
    }
}

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function x(str) {
    const d = document.createElement('div');
    d.textContent = String(str || '');
    return d.innerHTML;
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
loadConfig();
</script>
</body>
</html>
